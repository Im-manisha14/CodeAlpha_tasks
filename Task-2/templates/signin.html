<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialConnect - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signin-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            width: 500px;
            max-width: 95%;
            display: flex;
            min-height: auto;
        }



        .signin-right {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
        }

        .brand-logo h1 {
            font-size: 28px;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.025em;
        }

        .signin-form h2 {
            font-size: 24px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
            text-align: center;
        }

        .signin-form p {
            color: #6b7280;
            margin-bottom: 32px;
            font-size: 14px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 24px;
        }

        .forgot-password a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .signin-btn {
            width: 100%;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }

        .signin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
            background: #4338ca;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #9ca3af;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            padding: 0 16px;
        }

        .social-signin {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            color: #374151;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            border-color: #667eea;
            background: #f8fafc;
        }

        .social-btn i {
            margin-right: 8px;
            font-size: 18px;
        }

        .google-icon {
            color: #db4437;
        }

        .facebook-icon {
            color: #4267b2;
        }

        .signup-link {
            text-align: center;
            color: #6b7280;
        }

        .signup-link a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
            color: #4338ca;
        }

        .welcome-content h3 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .welcome-content p {
            font-size: 18px;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: flex-start;
        }

        .feature {
            display: flex;
            align-items: center;
            font-size: 16px;
        }

        .feature i {
            margin-right: 12px;
            font-size: 20px;
            opacity: 0.8;
        }

        .messages {
            margin-bottom: 24px;
        }

        .message-item {
            padding: 12px 16px;
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            border-radius: 8px;
            color: #dc2626;
            font-size: 14px;
            margin-bottom: 8px;
        }

        @media (max-width: 640px) {
            body {
                padding: 10px;
            }

            .signin-container {
                width: 100%;
                border-radius: 16px;
            }

            .signin-right {
                padding: 32px 24px;
            }

            .brand-logo h1 {
                font-size: 24px;
            }

            .signin-form h2 {
                font-size: 20px;
            }

            .social-signin {
                flex-direction: column;
                gap: 12px;
            }

            .social-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="signin-container">
        <div class="signin-right">
            <div class="brand-logo">
                <h1>SocialConnect</h1>
            </div>

            <div class="signin-form">
                <h2>Welcome Back</h2>
                <p>Enter your credentials to access your account</p>

                {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                    <div class="message-item">{{ message }}</div>
                    {% endfor %}
                </div>
                {% endif %}

                <form method="POST" action="">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Forgot your password?</a>
                    </div>

                    <button type="submit" class="signin-btn">
                        Sign In
                    </button>
                </form>

                <div class="divider">
                    <span>or continue with</span>
                </div>

                <div class="social-signin">
                    <a href="#" class="social-btn">
                        Google
                    </a>
                    <a href="#" class="social-btn">
                        Facebook
                    </a>
                </div>

                <div class="signup-link">
                    Don't have an account? <a href="/signup">Create Account</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
